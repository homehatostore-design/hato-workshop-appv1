<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hato Workshop App</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--brand:#111827;--chip:#eef2ff;--chipText:#4338ca;--border:#e5e7eb}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.nav{max-width:1400px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand{font-weight:800}.small{color:var(--muted);font-size:14px;line-height:1.5}
.main{max-width:1400px;margin:0 auto;padding:16px}.layout{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
.leftPane,.rightPane{min-height:calc(100vh - 110px)}.leftPane{position:sticky;top:78px;max-height:calc(100vh - 110px);overflow-y:auto;padding-right:4px}.rightPane{max-height:calc(100vh - 110px);overflow-y:auto;padding-left:2px}
.panel{background:#fff;border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 4px 16px rgba(0,0,0,.04);margin-bottom:16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--border);background:#fff;padding:10px 14px;border-radius:999px;cursor:pointer;font-size:14px}.tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.stepArea{padding:10px 0 4px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;padding:12px 14px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.card{background:#fff;border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.05)}.card img{width:100%;height:210px;object-fit:cover;background:#ddd}.p{padding:14px}.badge{display:inline-block;background:var(--chip);color:var(--chipText);padding:4px 10px;border-radius:999px;font-size:12px;margin:0 6px 6px 0}.title{margin:8px 0 6px;font-size:18px}.price{font-weight:800;margin-top:8px}
.listbtn{display:block;width:100%;text-align:left;margin:6px 0;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:#fafafa;cursor:pointer}
@media (max-width: 960px){.layout{grid-template-columns:1fr}.leftPane,.rightPane{position:static;max-height:none;overflow:visible}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="nav"><div class="brand">Hato Workshop App</div><div class="small">讀取 JSON，自動更新；白色模式；左右獨立捲動</div></div></header>
<main class="main">
  <div class="layout">
    <div class="leftPane">
      <div class="panel">
        <div class="small" style="margin-bottom:10px">撳每一項先展開細選項。</div>
        <button class="tab stepBtn" data-step="people" style="width:100%;margin-bottom:8px">參加者</button>
        <div id="peopleBox" class="stepArea" style="display:none"></div>
        <button class="tab stepBtn" data-step="age" style="width:100%;margin-bottom:8px">年齡層</button>
        <div id="ageBox" class="stepArea" style="display:none"></div>
        <button class="tab stepBtn" data-step="time" style="width:100%;margin-bottom:8px">時間</button>
        <div id="timeBox" class="stepArea" style="display:none"></div>
        <button class="tab stepBtn" data-step="budget" style="width:100%;margin-bottom:8px">預算</button>
        <div id="budgetBox" class="stepArea" style="display:none"></div>
        <button class="tab stepBtn" data-step="theme" style="width:100%;margin-bottom:8px">主題</button>
        <div id="themeBox" class="stepArea" style="display:none"></div>
      </div>
      <div class="panel">
        <div class="small">收藏／常用方案預留</div>
      </div>
    </div>

    <div class="rightPane">
      <div class="tabs panel" style="margin-bottom:16px">
        <button class="tab active" data-view="workshops">工作坊推薦</button>
        <button class="tab" data-view="helper">第二頁助手</button>
        <button class="tab" data-view="guide">使用方法</button>
      </div>
      <div id="workshopView">
        <div class="panel row"><div><select id="sort"><option value="relevance">按相關度</option><option value="price-asc">價錢由低到高</option><option value="price-desc">價錢由高到低</option></select></div><div><input id="q" placeholder="搜尋工作坊，例如：中秋、馬賽克、永生花" /></div></div>
        <div id="count" class="small" style="margin:0 0 12px 2px"></div>
        <div id="grid" class="grid"></div>
      </div>
      <div id="helperView" style="display:none">
        <div class="panel"><div id="helperTitle" style="font-size:20px;font-weight:800;margin-bottom:8px">第二頁助手</div><div class="small">按節日自動顯示材料包活動內容。</div></div>
        <div id="helperGrid" class="grid"></div>
      </div>
      <div id="guideView" style="display:none">
        <div class="panel"><h2 style="margin-top:0">點樣更新</h2><ol class="small"><li>改 <b>workshops.json</b> 或 <b>helper.json</b>。</li><li>重新 upload 去 GitHub repo root。</li><li>GitHub Pages 會自動更新。</li></ol></div>
      </div>
    </div>
  </div>
</main>
<script>
const state={view:'workshops',choices:{people:'',age:'',time:'',budget:'',theme:''}};
const stepOptions={people:['1人','2-5人','6-10人','11-20人','20人以上'],age:['幼稚園','小學','中學','成人','親子'],time:['30分鐘','1小時內','1-2小時','2小時以上'],budget:['$100以下','$100-$200','$200-$300','$300以上'],theme:['中秋','復活節','萬聖節','新年','永生花','馬賽克','壓花','流體','戳戳繡','扭扭棒']};
let workshops=[], helper=[];
const els={q:document.getElementById('q'),sort:document.getElementById('sort'),grid:document.getElementById('grid'),count:document.getElementById('count'),helperGrid:document.getElementById('helperGrid'),views:{workshops:document.getElementById('workshopView'),helper:document.getElementById('helperView'),guide:document.getElementById('guideView')}};
const boxes={people:document.getElementById('peopleBox'),age:document.getElementById('ageBox'),time:document.getElementById('timeBox'),budget:document.getElementById('budgetBox'),theme:document.getElementById('themeBox')};
function renderStepBoxes(){
  Object.entries(boxes).forEach(([k,el])=>{el.innerHTML=stepOptions[k].map(v=>`<button class="listbtn ${state.choices[k]===v?'tab active':''}" data-choice="${k}" data-value="${v}">${v}</button>`).join('')});
  document.querySelectorAll('.stepBtn').forEach(btn=>btn.onclick=()=>{const el=document.getElementById(btn.dataset.step+'Box'); el.style.display=el.style.display==='none'?'block':'none'});
  document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>{state.choices[b.dataset.choice]=b.dataset.value; renderStepBoxes(); renderWorkshops()});
}
function card(x){return `<div class="card"><img src="${x.image||'https://via.placeholder.com/800x500?text=Hato+Workshop'}" alt="${x.name}"><div class="p"><div>${x.category?`<span class="badge">${x.category}</span>`:''}</div><div class="title">${x.name}</div><div class="small">${x.description||''}</div><div class="price">HK$${x.price}</div><div class="small">${x.duration||''}</div></div></div>`}
function helperCard(x){return `<div class="card"><div class="p"><div><span class="badge">${x.category}</span><span class="badge">${x.theme||''}</span></div><div class="title">${x.name}</div><div class="small">${x.description}</div><div class="price">HK$${x.price}</div></div></div>`}
function renderWorkshops(){
  let list=[...workshops]; const term=els.q.value.trim().toLowerCase(); if(term) list=list.filter(x=>[x.name,x.category,x.description].join(' ').toLowerCase().includes(term));
  const c=state.choices; if(c.theme) list=list.filter(x=>[x.name,x.category,x.theme,x.description].join(' ').includes(c.theme));
  if(c.time==='1小時內') list=list.filter(x=>x.duration.includes('45')||x.duration.includes('60'));
  if(c.budget==='$100-$200') list=list.filter(x=>x.price>=100&&x.price<=200);
  if(c.age==='小學') list=list.filter(x=>x.audience.includes('小朋友')||x.audience.includes('親子')||x.audience.includes('小學'));
  if(c.age==='成人') list=list.filter(x=>x.audience.includes('成人'));
  if(c.people==='20人以上') list=list.filter(x=>x.price<=280);
  if(els.sort.value==='price-asc') list.sort((a,b)=>a.price-b.price); if(els.sort.value==='price-desc') list.sort((a,b)=>b.price-a.price);
  els.count.textContent=`共 ${list.length} 個工作坊`; els.grid.innerHTML=list.map(card).join('') || '<div class="panel">未有符合結果</div>';
}
function renderHelper(){ els.helperGrid.innerHTML=helper.map(helperCard).join(''); }
function setView(v){ state.view=v; document.querySelectorAll('.tab[data-view]').forEach(t=>t.classList.toggle('active',t.dataset.view===v)); Object.entries(els.views).forEach(([k,el])=>el.style.display=(k===v?'block':'none')); }
document.querySelectorAll('[data-view]').forEach(t=>t.addEventListener('click',()=>setView(t.dataset.view)));
els.q.addEventListener('input',renderWorkshops); els.sort.addEventListener('change',renderWorkshops);
(async()=>{ [workshops,helper]=await Promise.all([fetch('./workshops.json').then(r=>r.json()),fetch('./helper.json').then(r=>r.json())]); renderStepBoxes(); renderWorkshops(); renderHelper(); setView('workshops');})();
</script>
</body>
</html>
